<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Таро Оверлей</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --indigo:    #1a0a2e;
    --plum:      #2d1057;
    --violet:    #4a1a8a;
    --gold:      #d4af37;
    --gold-light:#f0d060;
    --rose:      #e8a0bf;
    --sky:       #a0c8e8;
    --glow:      rgba(212, 175, 55, 0.35);
    --glass:     rgba(26, 10, 46, 0.72);
    --glass2:    rgba(74, 26, 138, 0.18);
    --font-deco: 'Cinzel Decorative', serif;
    --font-body: 'Cormorant Garamond', serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: var(--font-body);
  }

  /* ── WIDGET WRAPPER ── */
  #widget {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  /* ── COMPACT BUTTON ── */
  #compact-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: var(--glass);
    border: 1px solid rgba(212, 175, 55, 0.5);
    border-radius: 40px;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.3s ease;
    box-shadow: 0 0 20px var(--glow), inset 0 1px 0 rgba(255,255,255,0.1);
    color: var(--gold);
    font-family: var(--font-deco);
    font-size: 11px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  #compact-btn:hover {
    border-color: var(--gold);
    box-shadow: 0 0 30px var(--glow), 0 0 60px rgba(212,175,55,0.2);
    transform: translateY(-2px);
  }
  #compact-btn .orb {
    font-size: 18px;
    filter: drop-shadow(0 0 6px var(--gold));
    animation: orb-pulse 3s ease-in-out infinite;
  }
  @keyframes orb-pulse {
    0%,100% { filter: drop-shadow(0 0 6px var(--gold)); transform: scale(1); }
    50%      { filter: drop-shadow(0 0 12px var(--gold-light)); transform: scale(1.1); }
  }

  /* ── EXPANDED PANEL ── */
  #panel {
    display: none;
    flex-direction: column;
    gap: 10px;
    padding: 20px;
    width: 280px;
    background: var(--glass);
    border: 1px solid rgba(212, 175, 55, 0.4);
    border-radius: 16px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 0 40px var(--glow), 0 8px 32px rgba(0,0,0,0.5);
    animation: panel-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  #panel.visible { display: flex; }

  #panel::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  @keyframes panel-in {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .panel-title {
    font-family: var(--font-deco);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-align: center;
    text-transform: uppercase;
  }

  .panel-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
  }

  .btn-action {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(212,175,55,0.4);
    background: rgba(74, 26, 138, 0.3);
    color: var(--gold-light);
    font-family: var(--font-deco);
    font-size: 10px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .btn-action::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent);
  }
  .btn-action:hover:not(:disabled) {
    border-color: var(--gold);
    background: rgba(74, 26, 138, 0.5);
    box-shadow: 0 0 16px var(--glow);
    transform: translateY(-1px);
  }
  .btn-action:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .btn-action .icon { font-size: 16px; }

  #cooldown-text {
    font-family: var(--font-body);
    font-size: 11px;
    font-style: italic;
    color: rgba(212,175,55,0.6);
    text-align: center;
  }

  /* ── QUESTION FORM ── */
  #question-form {
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  #question-form.visible { display: flex; }

  #question-input {
    background: rgba(26, 10, 46, 0.6);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 8px;
    padding: 10px 12px;
    color: #e0d0f0;
    font-family: var(--font-body);
    font-size: 13px;
    resize: none;
    height: 68px;
    outline: none;
    transition: border-color 0.2s;
  }
  #question-input::placeholder { color: rgba(212,175,55,0.35); font-style: italic; }
  #question-input:focus { border-color: rgba(212,175,55,0.7); }

  .btn-send {
    padding: 9px;
    background: linear-gradient(135deg, rgba(212,175,55,0.25), rgba(212,175,55,0.1));
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 8px;
    color: var(--gold);
    font-family: var(--font-deco);
    font-size: 9px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-send:hover { box-shadow: 0 0 12px var(--glow); }

  /* ── CARD REVEAL OVERLAY ── */
  #reveal-layer {
    display: none;
    position: fixed;
    bottom: 90px;
    right: 24px;
    width: 300px;
    background: var(--glass);
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 20px;
    padding: 24px 20px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 0 60px var(--glow), 0 20px 60px rgba(0,0,0,0.6);
    z-index: 10000;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    overflow: hidden;
  }
  #reveal-layer.visible { display: flex; animation: reveal-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

  @keyframes reveal-in {
    from { opacity: 0; transform: translateY(20px) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  #reveal-layer::before {
    content: '';
    position: absolute;
    top: -40%; left: 10%; right: 10%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(212,175,55,0.12), transparent 70%);
    pointer-events: none;
  }

  .close-reveal {
    position: absolute;
    top: 10px; right: 12px;
    background: none; border: none;
    color: rgba(212,175,55,0.5);
    font-size: 16px;
    cursor: pointer;
    transition: color 0.2s;
    line-height: 1;
  }
  .close-reveal:hover { color: var(--gold); }

  /* ── CARD FLIP ── */
  .card-scene {
    width: 110px; height: 170px;
    perspective: 800px;
  }
  .card-flip {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-flip.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    border: 1px solid rgba(212,175,55,0.5);
    box-shadow: 0 0 20px rgba(212,175,55,0.2);
  }
  .card-back {
    background: linear-gradient(145deg, var(--plum), var(--indigo));
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    animation: shimmer 2s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%,100% { filter: brightness(1); }
    50%      { filter: brightness(1.3) drop-shadow(0 0 12px var(--gold)); }
  }

  .card-front {
    transform: rotateY(180deg);
    background: linear-gradient(145deg, #0d0520, #1a0a2e);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 8px;
  }
  .card-front .card-emoji { font-size: 40px; filter: drop-shadow(0 0 8px var(--gold)); }
  .card-front .card-num   { font-family: var(--font-deco); font-size: 8px; color: rgba(212,175,55,0.6); letter-spacing: 0.15em; }
  .card-front .card-name-small { font-family: var(--font-deco); font-size: 9px; color: var(--gold); text-align: center; letter-spacing: 0.05em; }

  .reveal-card-name {
    font-family: var(--font-deco);
    font-size: 15px;
    color: var(--gold);
    text-align: center;
    letter-spacing: 0.05em;
  }
  .reveal-mood {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--rose);
    text-align: center;
    font-style: italic;
  }
  .reveal-meaning {
    font-family: var(--font-body);
    font-size: 13px;
    color: #d0c0e8;
    text-align: center;
    line-height: 1.5;
  }
  .reveal-advice {
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--sky);
    text-align: center;
    font-style: italic;
    padding: 10px 14px;
    border: 1px solid rgba(160,200,232,0.25);
    border-radius: 8px;
    background: rgba(160,200,232,0.05);
    line-height: 1.5;
  }

  /* ── GLOBAL EVENT BANNER ── */
  #global-banner {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 14px 20px;
    background: linear-gradient(90deg, var(--indigo), var(--plum), var(--indigo));
    border-bottom: 1px solid rgba(212,175,55,0.5);
    box-shadow: 0 0 30px var(--glow);
    z-index: 10001;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    animation: banner-in 0.6s ease;
  }
  #global-banner.visible { display: flex; }
  @keyframes banner-in {
    from { transform: translateY(-100%); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .banner-title {
    font-family: var(--font-deco);
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.2em;
  }
  .banner-card {
    font-family: var(--font-body);
    font-size: 18px;
    color: #f0e0ff;
    font-style: italic;
  }
  .banner-meaning {
    font-family: var(--font-body);
    font-size: 12px;
    color: rgba(212,175,55,0.8);
    text-align: center;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 100px; right: 24px;
    padding: 10px 18px;
    background: rgba(26, 10, 46, 0.92);
    border-radius: 10px;
    border: 1px solid rgba(212,175,55,0.4);
    color: #e0d0f0;
    font-family: var(--font-body);
    font-size: 13px;
    z-index: 11000;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s ease;
    pointer-events: none;
    max-width: 260px;
    text-align: center;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* ── PARTICLES ── */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    font-size: 16px;
    animation: float-particle 2s ease-out forwards;
  }
  @keyframes float-particle {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.3) rotate(360deg); }
  }
</style>
</head>
<body>

<!-- ── GLOBAL EVENT BANNER ── -->
<div id="global-banner">
  <div class="banner-title">✦ КАРТА ВСЕГО ЭФИРА ✦</div>
  <div class="banner-card" id="banner-card-name"></div>
  <div class="banner-meaning" id="banner-meaning"></div>
</div>

<!-- ── CARD REVEAL LAYER ── -->
<div id="reveal-layer">
  <button class="close-reveal" onclick="closeReveal()">✕</button>
  <div class="card-scene">
    <div class="card-flip" id="card-flip">
      <div class="card-face card-back">🔮</div>
      <div class="card-face card-front">
        <div class="card-emoji" id="card-emoji">🌙</div>
        <div class="card-name-small" id="card-name-small"></div>
      </div>
    </div>
  </div>
  <div class="reveal-card-name" id="reveal-card-name"></div>
  <div class="reveal-mood" id="reveal-mood"></div>
  <div class="reveal-meaning" id="reveal-meaning"></div>
  <div class="reveal-advice" id="reveal-advice"></div>
</div>

<!-- ── MAIN WIDGET ── -->
<div id="widget">
  <!-- Expanded panel -->
  <div id="panel">
    <div class="panel-title">✦ Таро Оракул ✦</div>
    <div class="panel-divider"></div>

    <button class="btn-action" id="btn-draw" onclick="drawCard()">
      <span class="icon">🃏</span>
      ВЫТЯНУТЬ КАРТУ
    </button>

    <button class="btn-action" id="btn-question-toggle" onclick="toggleQuestionForm()">
      <span class="icon">💬</span>
      ЗАДАТЬ ВОПРОС
    </button>

    <div id="question-form">
      <textarea id="question-input" placeholder="Твой вопрос к картам..." maxlength="280"></textarea>
      <button class="btn-send" onclick="submitQuestion()">✦ ОТПРАВИТЬ СТРИМЕРУ ✦</button>
    </div>

    <div id="cooldown-text" style="display:none"></div>
  </div>

  <!-- Compact toggle button -->
  <button id="compact-btn" onclick="togglePanel()">
    <span class="orb">🔮</span>
    <span id="compact-label">СПРОСИТЬ КАРТЫ</span>
  </button>
</div>

<div id="toast"></div>

<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API_BASE = window.TAROT_API_URL || 'http://localhost:3001';
const WS_BASE  = API_BASE.replace(/^http/, 'ws');

// Card emoji map
const CARD_EMOJIS = {
  fool:'🎪', magician:'🔥', priestess:'🌙', empress:'🌸', emperor:'🏰',
  hierophant:'📜', lovers:'💕', chariot:'⚡', strength:'🦁', hermit:'🕯',
  wheel:'🎡', justice:'⚖️', hangedman:'🌀', death:'🌑', temperance:'🌊',
  devil:'🔗', tower:'⚡', star:'💫', moon:'🌙', sun:'☀️',
  judgement:'🎺', world:'🌍'
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  token: null,
  channelId: 'test_channel',
  userId: null,
  panelOpen: false,
  questionFormOpen: false,
  cooldownTimer: null,
};

// ── TWITCH INTEGRATION ────────────────────────────────────────────────────────
if (window.Twitch && window.Twitch.ext) {
  Twitch.ext.onAuthorized(auth => {
    state.token = auth.token;
    state.channelId = auth.channelId;
    state.userId = auth.userId;
    connectWebSocket();
  });
  Twitch.ext.onContext(ctx => {
    // context available if needed
  });
} else {
  // Local test mode
  state.token = 'local_test_token';
  state.channelId = 'test_channel';
  state.userId = 'test_user';
  setTimeout(connectWebSocket, 500);
}

// ── WEBSOCKET ─────────────────────────────────────────────────────────────────
function connectWebSocket() {
  try {
    const ws = new WebSocket(`${WS_BASE}?channelId=${state.channelId}`);
    ws.onmessage = e => {
      const msg = JSON.parse(e.data);
      handleWSMessage(msg);
    };
    ws.onerror = () => {};
  } catch(e) {}
}

function handleWSMessage(msg) {
  if (msg.type === 'global_card') showGlobalBanner(msg.event.card);
  if (msg.type === 'highlight_event') handleHighlight(msg.event);
}

// ── UI FUNCTIONS ──────────────────────────────────────────────────────────────
function togglePanel() {
  state.panelOpen = !state.panelOpen;
  document.getElementById('panel').classList.toggle('visible', state.panelOpen);
  document.getElementById('compact-label').textContent = state.panelOpen ? 'ЗАКРЫТЬ' : 'СПРОСИТЬ КАРТЫ';
}

function toggleQuestionForm() {
  state.questionFormOpen = !state.questionFormOpen;
  document.getElementById('question-form').classList.toggle('visible', state.questionFormOpen);
}

async function drawCard() {
  const btn = document.getElementById('btn-draw');
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/draw`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${state.token}`,
      }
    });

    if (res.status === 429) {
      const data = await res.json();
      startCooldownDisplay(data.remaining);
      btn.disabled = false;
      return;
    }

    if (!res.ok) throw new Error('Server error');

    const data = await res.json();
    showReveal(data.card);
    spawnParticles();
    setTimeout(() => { btn.disabled = false; }, 3000);

  } catch (err) {
    showToast('✦ Духи не отвечают... попробуй снова ✦');
    btn.disabled = false;
  }
}

function showReveal(card) {
  // Reset flip
  const flip = document.getElementById('card-flip');
  flip.classList.remove('flipped');

  // Set card emoji  
  const emoji = CARD_EMOJIS[card.id] || '🌟';
  document.getElementById('card-emoji').textContent = emoji;
  document.getElementById('card-name-small').textContent = card.name;

  // Set text (hidden until flip)
  document.getElementById('reveal-card-name').textContent = card.name;
  document.getElementById('reveal-mood').textContent = card.mood;
  document.getElementById('reveal-meaning').textContent = card.shortMeaning;
  document.getElementById('reveal-advice').textContent = '✦ ' + card.advice + ' ✦';

  // Show layer then flip after delay
  document.getElementById('reveal-layer').classList.add('visible');
  setTimeout(() => flip.classList.add('flipped'), 600);
}

function closeReveal() {
  document.getElementById('reveal-layer').classList.remove('visible');
}

async function submitQuestion() {
  const input = document.getElementById('question-input');
  const text = input.value.trim();
  if (!text) return;

  try {
    const res = await fetch(`${API_BASE}/api/question`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${state.token}`,
      },
      body: JSON.stringify({ text })
    });

    if (res.status === 429) {
      const data = await res.json();
      showToast(`⏳ Подожди ${data.remaining} сек. перед новым вопросом`);
      return;
    }

    if (!res.ok) throw new Error();

    input.value = '';
    toggleQuestionForm();
    showToast('✦ Вопрос отправлен стримеру ✦');

  } catch {
    showToast('✦ Не удалось отправить вопрос ✦');
  }
}

function showGlobalBanner(card) {
  const banner = document.getElementById('global-banner');
  document.getElementById('banner-card-name').textContent = (CARD_EMOJIS[card.id] || '🌟') + ' ' + card.name;
  document.getElementById('banner-meaning').textContent = card.shortMeaning;
  banner.classList.add('visible');
  spawnParticles(true);
  setTimeout(() => banner.classList.remove('visible'), 12000);
}

function handleHighlight(event) {
  showReveal(event.card);
  showToast(`✦ Стример выделил карту ${event.card.name} ✦`);
}

function startCooldownDisplay(seconds) {
  const el = document.getElementById('cooldown-text');
  el.style.display = 'block';
  let left = seconds;
  el.textContent = `⏳ Следующая карта через ${left} сек.`;
  if (state.cooldownTimer) clearInterval(state.cooldownTimer);
  state.cooldownTimer = setInterval(() => {
    left--;
    if (left <= 0) {
      clearInterval(state.cooldownTimer);
      el.style.display = 'none';
      document.getElementById('btn-draw').disabled = false;
    } else {
      el.textContent = `⏳ Следующая карта через ${left} сек.`;
    }
  }, 1000);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function spawnParticles(big = false) {
  const symbols = ['✦','✧','⋆','🌟','💫','✨','⭐'];
  const count = big ? 12 : 6;
  const btn = document.getElementById('compact-btn');
  const rect = btn.getBoundingClientRect();

  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      p.style.left = (rect.left + rect.width/2 + (Math.random()-0.5)*60) + 'px';
      p.style.top  = (rect.top + (Math.random()-0.5)*20) + 'px';
      p.style.fontSize = (big ? 18 : 12) + 'px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }, i * 80);
  }
}
</script>
</body>
</html>
